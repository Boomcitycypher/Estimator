<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Motor Bros – Partners & Expenses</title>
  <script src="db.js"></script>
  <style>
    :root{--bg:#f1f5f9;--card:#fff;--muted:#64748b;--text:#0f172a;
      --accent:#3b82f6;--accent2:#6366f1;--border:#e2e8f0;
      --success:#059669;--warn:#d97706;--danger:#dc2626}
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);color:var(--text)}
    nav{background:linear-gradient(135deg,#1e3a5f,#1e40af);color:#fff;
      display:flex;align-items:center;overflow-x:auto;padding:0 16px;min-height:56px;border-bottom:1px solid #1d4ed8}
    nav .brand{font-weight:700;font-size:1.1rem;white-space:nowrap;margin-right:20px;padding:14px 0}
    nav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.85rem;font-weight:500;
      padding:18px 12px;white-space:nowrap;border-bottom:3px solid transparent;transition:.15s}
    nav a:hover{color:#fff;background:rgba(255,255,255,.08)}
    nav a.active{color:#fff;border-bottom-color:#60a5fa}
    .page{max-width:1100px;margin:0 auto;padding:24px 16px}
    h1{font-size:1.4rem;font-weight:700;margin:0 0 4px}
    .subtitle{color:var(--muted);font-size:.88rem;margin:0 0 20px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
    .partner-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:20px;border-top:4px solid var(--accent)}
    .partner-card:nth-child(2){border-top-color:var(--success)}
    .partner-card:nth-child(3){border-top-color:var(--accent2)}
    .partner-card:nth-child(4){border-top-color:var(--warn)}
    .partner-name{font-size:1.1rem;font-weight:700;margin-bottom:12px}
    .partner-stat{display:flex;justify-content:space-between;align-items:center;
      padding:7px 0;border-bottom:1px solid var(--border);font-size:.85rem}
    .partner-stat:last-child{border-bottom:none}
    .partner-stat .val{font-weight:700}
    .val-green{color:var(--success)}
    .val-red{color:var(--danger)}
    .val-orange{color:var(--warn)}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:8px;
      font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:.15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:#2563eb}
    .btn-outline{background:#fff;color:var(--accent);border:1px solid var(--border)}
    .btn-outline:hover{background:#f8fafc}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-sm{padding:4px 9px;font-size:.74rem}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center}
    .toolbar input,.toolbar select{padding:8px 12px;border:1px solid var(--border);
      border-radius:8px;font-size:.85rem;background:#fff}
    .toolbar input{flex:1;min-width:160px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.83rem}
    th{text-align:left;padding:9px 10px;font-size:.7rem;text-transform:uppercase;
      letter-spacing:.05em;color:var(--muted);border-bottom:2px solid var(--border);background:#fafafa;white-space:nowrap}
    td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#f8fafc}
    .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:600}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;
      display:none;align-items:center;justify-content:center;padding:16px}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;width:100%;max-width:520px;
      max-height:92vh;overflow-y:auto;padding:28px 24px;position:relative}
    .modal h2{margin:0 0 20px;font-size:1.1rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-grid .full{grid-column:1/-1}
    .field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);
      margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
    .field input,.field select,.field textarea{width:100%;padding:8px 10px;
      border:1px solid var(--border);border-radius:8px;font-size:.85rem;color:var(--text);background:#fff}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;
      padding-top:16px;border-top:1px solid var(--border)}
    .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;
      font-size:1.2rem;cursor:pointer;color:var(--muted)}
    .section-title{font-size:1rem;font-weight:700;padding:16px 20px 0;margin:0}
    .cat-badge{padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:600;
      background:#f1f5f9;color:#475569}
    @media(max-width:640px){.grid2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav>
  <span class="brand">🚗 Motor Bros</span>
  <a href="dealership.html">Dashboard</a>
  <a href="vehicles.html">Inventory</a>
  <a href="payments.html">Payments</a>
  <a href="crm.html">CRM</a>
  <a href="partners.html" class="active">Partners</a>
  <a href="reports.html">Reports</a>
</nav>

<div class="page">
  <h1>Partners & Expenses</h1>
  <p class="subtitle">Investment exposure, profit breakdown, and vehicle expense tracking per partner.</p>

  <div class="grid2" id="partnerCards"></div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <h2 style="margin:0;font-size:1rem;font-weight:700">Expense Log</h2>
    <button class="btn btn-primary" onclick="openModal()">＋ Add Expense</button>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search description, vehicle, category…"/>
    <select id="filterPartner"><option value="">All Partners</option></select>
    <select id="filterCat"><option value="">All Categories</option>
      <option>Repair</option><option>Import Fee</option><option>Detailing</option>
      <option>Transport</option><option>Registration</option><option>Other</option>
    </select>
  </div>

  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>ID</th><th>Date</th><th>Vehicle</th><th>Partner</th><th>Category</th><th>Amount</th><th>Description</th><th></th></tr></thead>
        <tbody id="expBody"></tbody>
      </table>
      <div style="text-align:center;padding:32px;color:var(--muted)" id="emptyMsg" style="display:none">No expenses found.</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Add Expense</h2>
    <div class="form-grid">
      <div class="field full">
        <label>Vehicle</label>
        <select id="f_vehicleId"></select>
      </div>
      <div class="field"><label>Partner</label><select id="f_partner"></select></div>
      <div class="field">
        <label>Category</label>
        <select id="f_category">
          <option>Repair</option><option>Import Fee</option><option>Detailing</option>
          <option>Transport</option><option>Registration</option><option>Other</option>
        </select>
      </div>
      <div class="field"><label>Amount ($)</label><input id="f_amount" type="number" placeholder="500"/></div>
      <div class="field"><label>Date</label><input id="f_date" type="date"/></div>
      <div class="field full"><label>Description</label><input id="f_description" placeholder="What was this for?"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveExpense()">Save Expense</button>
    </div>
  </div>
</div>

<script>
  let editId = null;

  const COLORS = ['var(--accent)','var(--success)','var(--accent2)','var(--warn)'];

  function renderPartnerCards(){
    const summary = DB.partnerSummary();
    document.getElementById('partnerCards').innerHTML = summary.map((p,i)=>`
      <div class="partner-card">
        <div class="partner-name">👤 ${p.name}</div>
        <div class="partner-stat"><span>Vehicles Owned</span><span class="val">${p.vehicles}</span></div>
        <div class="partner-stat"><span>Total Invested</span><span class="val val-orange">$${p.invested.toLocaleString()}</span></div>
        <div class="partner-stat"><span>Revenue Collected</span><span class="val">$${p.revenue.toLocaleString()}</span></div>
        <div class="partner-stat"><span>Realized Profit</span>
          <span class="val ${p.profit>=0?'val-green':'val-red'}">$${p.profit.toLocaleString()}</span>
        </div>
        <div class="partner-stat"><span>Net Exposure</span>
          <span class="val val-orange">$${(p.invested - p.revenue).toLocaleString()}</span>
        </div>
      </div>`).join('');
  }

  function renderExpenses(){
    const search  = document.getElementById('searchInput').value.toLowerCase();
    const fP      = document.getElementById('filterPartner').value;
    const fC      = document.getElementById('filterCat').value;
    let list = DB.get('expenses');
    if(search) list = list.filter(e=>[e.description,e.vehicleId,e.category,e.partner].join(' ').toLowerCase().includes(search));
    if(fP) list = list.filter(e=>e.partner===fP);
    if(fC) list = list.filter(e=>e.category===fC);
    list = list.slice().sort((a,b)=>b.date.localeCompare(a.date));

    const vehicles = DB.get('vehicles');
    const vMap = {};
    vehicles.forEach(v=>vMap[v.id]=v);

    const body = document.getElementById('expBody');
    const empty = document.getElementById('emptyMsg');
    if(!list.length){ body.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';
    body.innerHTML = list.map(e=>{
      const v = vMap[e.vehicleId];
      const vLabel = v ? `${v.year} ${v.make} ${v.model}` : e.vehicleId;
      return `<tr>
        <td><b>${e.id}</b></td>
        <td>${e.date}</td>
        <td>${vLabel}<br><span style="font-size:.72rem;color:var(--muted)">${e.vehicleId}</span></td>
        <td>${e.partner}</td>
        <td><span class="cat-badge">${e.category}</span></td>
        <td><b style="color:var(--danger)">$${Number(e.amount).toLocaleString()}</b></td>
        <td style="color:var(--muted)">${e.description||'—'}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="openModal('${e.id}')">Edit</button>
          <button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="deleteExpense('${e.id}')">Del</button>
        </td>
      </tr>`;
    }).join('');
  }

  function populateSelects(){
    const partners = DB.getPartners();
    const fEl = document.getElementById('filterPartner');
    const pEl = document.getElementById('f_partner');
    partners.forEach(p=>{
      fEl.innerHTML += `<option value="${p}">${p}</option>`;
      pEl.innerHTML += `<option value="${p}">${p}</option>`;
    });
    const vEl = document.getElementById('f_vehicleId');
    DB.get('vehicles').forEach(v=>{
      vEl.innerHTML += `<option value="${v.id}">${v.id} · ${v.year} ${v.make} ${v.model}</option>`;
    });
  }

  function openModal(id){
    editId = id||null;
    document.getElementById('modalTitle').textContent = id ? 'Edit Expense' : 'Add Expense';
    if(!id){
      document.getElementById('f_amount').value='';
      document.getElementById('f_description').value='';
      document.getElementById('f_date').value=new Date().toISOString().slice(0,10);
    } else {
      const e = DB.get('expenses').find(x=>x.id===id);
      if(!e) return;
      ['vehicleId','partner','category','amount','date','description']
        .forEach(f=>document.getElementById('f_'+f).value=e[f]||'');
    }
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

  function saveExpense(){
    const expenses = DB.get('expenses');
    const data = {
      vehicleId: document.getElementById('f_vehicleId').value,
      partner: document.getElementById('f_partner').value,
      category: document.getElementById('f_category').value,
      amount: Number(document.getElementById('f_amount').value)||0,
      date: document.getElementById('f_date').value,
      description: document.getElementById('f_description').value.trim(),
    };
    if(!data.vehicleId||!data.amount){ alert('Vehicle and amount are required.'); return; }
    if(editId){
      const idx = expenses.findIndex(e=>e.id===editId);
      expenses[idx]={...expenses[idx],...data};
    } else {
      data.id = DB.nextId('E', expenses);
      expenses.push(data);
    }
    DB.save('expenses', expenses);
    closeModal();
    renderPartnerCards();
    renderExpenses();
  }

  function deleteExpense(id){
    if(!confirm('Delete this expense?')) return;
    DB.save('expenses', DB.get('expenses').filter(e=>e.id!==id));
    renderPartnerCards();
    renderExpenses();
  }

  document.getElementById('searchInput').addEventListener('input', renderExpenses);
  document.getElementById('filterPartner').addEventListener('change', renderExpenses);
  document.getElementById('filterCat').addEventListener('change', renderExpenses);

  populateSelects();
  renderPartnerCards();
  renderExpenses();
</script>
</body>
</html>
