<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Motor Bros – Payment Log</title>
  <script src="db.js"></script>
  <style>
    :root{--bg:#f1f5f9;--card:#fff;--muted:#64748b;--text:#0f172a;
      --accent:#3b82f6;--accent2:#6366f1;--border:#e2e8f0;
      --success:#059669;--warn:#d97706;--danger:#dc2626}
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);color:var(--text)}
    nav{background:linear-gradient(135deg,#1e3a5f,#1e40af);color:#fff;
      display:flex;align-items:center;overflow-x:auto;padding:0 16px;min-height:56px;border-bottom:1px solid #1d4ed8}
    nav .brand{font-weight:700;font-size:1.1rem;white-space:nowrap;margin-right:20px;padding:14px 0}
    nav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.85rem;font-weight:500;
      padding:18px 12px;white-space:nowrap;border-bottom:3px solid transparent;transition:.15s}
    nav a:hover{color:#fff;background:rgba(255,255,255,.08)}
    nav a.active{color:#fff;border-bottom-color:#60a5fa}
    .page{max-width:1100px;margin:0 auto;padding:24px 16px}
    h1{font-size:1.4rem;font-weight:700;margin:0 0 4px}
    .subtitle{color:var(--muted);font-size:.88rem;margin:0 0 20px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;border-top:3px solid var(--accent)}
    .stat.green{border-top-color:var(--success)}
    .stat.orange{border-top-color:var(--warn)}
    .stat-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;margin-bottom:5px}
    .stat-value{font-size:1.6rem;font-weight:700}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center}
    .toolbar input,.toolbar select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;background:#fff}
    .toolbar input{flex:1;min-width:160px}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:8px;
      font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:.15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:#2563eb}
    .btn-outline{background:#fff;color:var(--accent);border:1px solid var(--border)}
    .btn-outline:hover{background:#f8fafc}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-sm{padding:4px 9px;font-size:.74rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.83rem}
    th{text-align:left;padding:9px 10px;font-size:.7rem;text-transform:uppercase;
      letter-spacing:.05em;color:var(--muted);border-bottom:2px solid var(--border);background:#fafafa;white-space:nowrap}
    td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#f8fafc}
    .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:600}
    .badge-cash{background:#dcfce7;color:#166534}
    .badge-transfer{background:#dbeafe;color:#1e40af}
    .badge-bank{background:#ede9fe;color:#5b21b6}
    .badge-card{background:#fef9c3;color:#854d0e}
    .section-header{background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:18px 20px;margin-bottom:16px}
    .section-header h2{margin:0 0 12px;font-size:1rem;font-weight:700}
    .balance-row{display:flex;align-items:center;gap:12px;padding:10px 0;
      border-bottom:1px solid var(--border)}
    .balance-row:last-child{border-bottom:none}
    .progress-wrap{flex:1;background:#f1f5f9;border-radius:99px;height:8px;overflow:hidden}
    .progress-bar{height:100%;border-radius:99px;background:var(--success)}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;
      display:none;align-items:center;justify-content:center;padding:16px}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;width:100%;max-width:500px;
      max-height:92vh;overflow-y:auto;padding:28px 24px;position:relative}
    .modal h2{margin:0 0 20px;font-size:1.1rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-grid .full{grid-column:1/-1}
    .field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);
      margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
    .field input,.field select,.field textarea{width:100%;padding:8px 10px;
      border:1px solid var(--border);border-radius:8px;font-size:.85rem;color:var(--text);background:#fff}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;
      padding-top:16px;border-top:1px solid var(--border)}
    .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;
      font-size:1.2rem;cursor:pointer;color:var(--muted)}
  </style>
</head>
<body>
<nav>
  <span class="brand">🚗 Motor Bros</span>
  <a href="dealership.html">Dashboard</a>
  <a href="vehicles.html">Inventory</a>
  <a href="payments.html" class="active">Payments</a>
  <a href="crm.html">CRM</a>
  <a href="partners.html">Partners</a>
  <a href="reports.html">Reports</a>
</nav>

<div class="page">
  <h1>Payment Log</h1>
  <p class="subtitle">Single log of all customer payments — cash, installments, wire transfers.</p>

  <div class="stats" id="payStats"></div>

  <div class="section-header">
    <h2>Customer Balance Tracker</h2>
    <div id="balanceList"></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search buyer, vehicle, note…"/>
    <select id="filterVehicle"><option value="">All Vehicles</option></select>
    <button class="btn btn-primary" onclick="openModal()">＋ Record Payment</button>
  </div>

  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>Date</th><th>Vehicle</th><th>Buyer</th><th>Amount</th><th>Method</th><th>Note</th><th></th></tr>
        </thead>
        <tbody id="payBody"></tbody>
      </table>
      <div style="text-align:center;padding:32px;color:var(--muted)" id="emptyMsg" style="display:none">No payments found.</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Record Payment</h2>
    <div class="form-grid">
      <div class="field full">
        <label>Vehicle</label>
        <select id="f_vehicleId" onchange="autofillBuyer()"></select>
      </div>
      <div class="field full"><label>Buyer Name</label><input id="f_buyerName" placeholder="Auto-filled from vehicle"/></div>
      <div class="field"><label>Amount ($)</label><input id="f_amount" type="number" placeholder="5000"/></div>
      <div class="field"><label>Date</label><input id="f_date" type="date"/></div>
      <div class="field">
        <label>Method</label>
        <select id="f_method">
          <option value="cash">Cash</option>
          <option value="transfer">Bank Transfer</option>
          <option value="bank">Bank Check</option>
          <option value="card">Card</option>
        </select>
      </div>
      <div class="field"><label>Note</label><input id="f_note" placeholder="e.g. Month 1 installment"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePayment()">Save Payment</button>
    </div>
  </div>
</div>

<script>
  let editId = null;

  const methodBadge = m => ({
    cash:'<span class="badge badge-cash">Cash</span>',
    transfer:'<span class="badge badge-transfer">Transfer</span>',
    bank:'<span class="badge badge-bank">Bank</span>',
    card:'<span class="badge badge-card">Card</span>',
  }[m] || `<span class="badge">${m}</span>`);

  function renderStats() {
    const payments = DB.get('payments');
    const total    = payments.reduce((s,p)=>s+Number(p.amount),0);
    const vehicles = DB.get('vehicles');
    const outstanding = vehicles.filter(v=>v.status==='sold').reduce((s,v)=>s+DB.customerBalance(v),0);
    const thisMonth = new Date().toISOString().slice(0,7);
    const monthTotal = payments.filter(p=>p.date.startsWith(thisMonth)).reduce((s,p)=>s+Number(p.amount),0);
    document.getElementById('payStats').innerHTML = [
      {label:'Total Collected',value:'$'+total.toLocaleString(),cls:'green'},
      {label:'This Month',value:'$'+monthTotal.toLocaleString(),cls:''},
      {label:'Outstanding',value:'$'+outstanding.toLocaleString(),cls:'orange'},
      {label:'Payments Logged',value:payments.length,cls:''},
    ].map(d=>`<div class="stat ${d.cls}">
      <div class="stat-label">${d.label}</div>
      <div class="stat-value">${d.value}</div>
    </div>`).join('');
  }

  function renderBalances() {
    const vehicles = DB.get('vehicles').filter(v=>v.status==='sold' && v.salePrice);
    document.getElementById('balanceList').innerHTML = vehicles.map(v=>{
      const paid = DB.vehicleRevenue(v);
      const total = Number(v.salePrice);
      const bal   = DB.customerBalance(v);
      const pct   = total ? Math.min(100, Math.round(paid/total*100)) : 100;
      const color = bal===0?'var(--success)':bal<total/2?'var(--warn)':'var(--danger)';
      return `<div class="balance-row">
        <div style="min-width:120px">
          <div style="font-weight:600;font-size:.85rem">${v.buyerName||'—'}</div>
          <div style="font-size:.72rem;color:var(--muted)">${v.id} · ${v.year} ${v.make} ${v.model}</div>
        </div>
        <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${color}"></div></div>
        <div style="min-width:100px;text-align:right;font-size:.82rem">
          <span style="font-weight:700;color:${color}">$${bal.toLocaleString()}</span>
          <span style="color:var(--muted)"> left</span><br>
          <span style="color:var(--muted);font-size:.72rem">of $${total.toLocaleString()}</span>
        </div>
      </div>`;
    }).join('') || '<p style="color:var(--muted);font-size:.85rem">No installment sales recorded.</p>';
  }

  function renderTable() {
    const search   = document.getElementById('searchInput').value.toLowerCase();
    const filterV  = document.getElementById('filterVehicle').value;
    let pList = DB.get('payments');
    if (search) pList = pList.filter(p=>[p.buyerName,p.vehicleId,p.note,p.method].join(' ').toLowerCase().includes(search));
    if (filterV) pList = pList.filter(p=>p.vehicleId===filterV);
    pList = pList.slice().sort((a,b)=>b.date.localeCompare(a.date));

    const vehicles = DB.get('vehicles');
    const vMap = {};
    vehicles.forEach(v=>vMap[v.id]=v);

    const body  = document.getElementById('payBody');
    const empty = document.getElementById('emptyMsg');
    if (!pList.length){ body.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';
    body.innerHTML = pList.map(p=>{
      const v = vMap[p.vehicleId];
      const vLabel = v ? `${v.year} ${v.make} ${v.model}` : p.vehicleId;
      return `<tr>
        <td><b>${p.id}</b></td>
        <td>${p.date}</td>
        <td>${vLabel}<br><span style="font-size:.72rem;color:var(--muted)">${p.vehicleId}</span></td>
        <td>${p.buyerName}</td>
        <td><b style="color:var(--success)">$${Number(p.amount).toLocaleString()}</b></td>
        <td>${methodBadge(p.method)}</td>
        <td style="color:var(--muted)">${p.note||'—'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deletePayment('${p.id}')">Del</button></td>
      </tr>`;
    }).join('');
  }

  function populateVehicleSelect(selectId) {
    const sel = document.getElementById(selectId);
    const vehicles = DB.get('vehicles').filter(v=>v.salePrice||v.status!=='available');
    sel.innerHTML = '<option value="">— Select Vehicle —</option>';
    vehicles.forEach(v=>{
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.id} · ${v.year} ${v.make} ${v.model} (${v.buyerName||'No buyer'})`;
      sel.appendChild(opt);
    });
  }

  function autofillBuyer() {
    const vid = document.getElementById('f_vehicleId').value;
    const v   = DB.get('vehicles').find(x=>x.id===vid);
    document.getElementById('f_buyerName').value = v ? v.buyerName : '';
  }

  function openModal() {
    editId = null;
    document.getElementById('f_amount').value = '';
    document.getElementById('f_note').value   = '';
    document.getElementById('f_method').value = 'cash';
    document.getElementById('f_date').value   = new Date().toISOString().slice(0,10);
    populateVehicleSelect('f_vehicleId');
    document.getElementById('f_buyerName').value = '';
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

  function savePayment() {
    const payments = DB.get('payments');
    const vid = document.getElementById('f_vehicleId').value;
    const amount = Number(document.getElementById('f_amount').value);
    if (!vid||!amount){ alert('Vehicle and amount are required.'); return; }
    const data = {
      id: DB.nextId('P', payments),
      vehicleId: vid,
      buyerName: document.getElementById('f_buyerName').value.trim(),
      amount,
      date: document.getElementById('f_date').value,
      method: document.getElementById('f_method').value,
      note: document.getElementById('f_note').value.trim(),
    };
    payments.push(data);
    DB.save('payments', payments);
    closeModal();
    renderStats();
    renderBalances();
    renderTable();
  }

  function deletePayment(id) {
    if (!confirm('Delete this payment record?')) return;
    DB.save('payments', DB.get('payments').filter(p=>p.id!==id));
    renderStats(); renderBalances(); renderTable();
  }

  // Filter vehicle dropdown
  function populateFilterVehicle() {
    const sel = document.getElementById('filterVehicle');
    DB.get('vehicles').forEach(v=>{
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.id} · ${v.make} ${v.model}`;
      sel.appendChild(opt);
    });
  }

  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('filterVehicle').addEventListener('change', renderTable);

  populateFilterVehicle();
  renderStats();
  renderBalances();
  renderTable();
</script>
</body>
</html>
