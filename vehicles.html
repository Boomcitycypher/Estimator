<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Motor Bros – Vehicle Inventory</title>
  <script src="db.js"></script>
  <style>
    :root{--bg:#f1f5f9;--card:#fff;--muted:#64748b;--text:#0f172a;
      --accent:#3b82f6;--accent2:#6366f1;--border:#e2e8f0;
      --success:#059669;--warn:#d97706;--danger:#dc2626}
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);color:var(--text)}
    nav{background:linear-gradient(135deg,#1e3a5f,#1e40af);color:#fff;
      display:flex;align-items:center;gap:0;overflow-x:auto;
      padding:0 16px;min-height:56px;border-bottom:1px solid #1d4ed8}
    nav .brand{font-weight:700;font-size:1.1rem;letter-spacing:-.5px;
      white-space:nowrap;margin-right:20px;padding:14px 0}
    nav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.85rem;
      font-weight:500;padding:18px 12px;white-space:nowrap;border-bottom:3px solid transparent;transition:.15s}
    nav a:hover{color:#fff;background:rgba(255,255,255,.08)}
    nav a.active{color:#fff;border-bottom-color:#60a5fa}
    .page{max-width:1200px;margin:0 auto;padding:24px 16px}
    h1{font-size:1.4rem;font-weight:700;margin:0 0 4px}
    .subtitle{color:var(--muted);font-size:.88rem;margin:0 0 20px}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
    .toolbar input,.toolbar select{padding:8px 12px;border:1px solid var(--border);
      border-radius:8px;font-size:.85rem;background:#fff;color:var(--text)}
    .toolbar input{flex:1;min-width:180px}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;
      border-radius:8px;font-size:.85rem;font-weight:600;text-decoration:none;
      cursor:pointer;border:none;transition:.15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:#2563eb}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-sm{padding:4px 10px;font-size:.75rem}
    .btn-outline{background:#fff;color:var(--accent);border:1px solid var(--border)}
    .btn-outline:hover{background:#f8fafc;border-color:var(--accent)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.83rem}
    th{text-align:left;padding:9px 10px;font-size:.7rem;text-transform:uppercase;
      letter-spacing:.05em;color:var(--muted);border-bottom:2px solid var(--border);
      white-space:nowrap;background:#fafafa}
    td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#f8fafc}
    .badge{display:inline-block;padding:2px 8px;border-radius:99px;
      font-size:.7rem;font-weight:600;text-transform:capitalize}
    .badge-green{background:#dcfce7;color:#166534}
    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-orange{background:#ffedd5;color:#9a3412}
    .badge-gray{background:#f1f5f9;color:#475569}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;
      display:none;align-items:center;justify-content:center;padding:16px}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;width:100%;max-width:620px;
      max-height:92vh;overflow-y:auto;padding:28px 24px;position:relative}
    .modal h2{margin:0 0 20px;font-size:1.15rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-grid .full{grid-column:1/-1}
    .field label{display:block;font-size:.78rem;font-weight:600;
      color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
    .field input,.field select,.field textarea{width:100%;padding:8px 10px;
      border:1px solid var(--border);border-radius:8px;font-size:.85rem;
      color:var(--text);background:#fff}
    .field textarea{resize:vertical;min-height:60px}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;
      padding-top:16px;border-top:1px solid var(--border)}
    .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;
      font-size:1.2rem;cursor:pointer;color:var(--muted)}
    .empty{text-align:center;padding:40px;color:var(--muted)}
  </style>
</head>
<body>
<nav>
  <span class="brand">🚗 Motor Bros</span>
  <a href="dealership.html">Dashboard</a>
  <a href="vehicles.html" class="active">Inventory</a>
  <a href="payments.html">Payments</a>
  <a href="crm.html">CRM</a>
  <a href="partners.html">Partners</a>
  <a href="reports.html">Reports</a>
</nav>

<div class="page">
  <h1>Vehicle Inventory</h1>
  <p class="subtitle">Master list of all vehicles — import, track, and manage from one place.</p>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search by make, model, VIN, buyer…"/>
    <select id="filterStatus">
      <option value="">All Statuses</option>
      <option value="available">Available</option>
      <option value="pending">Pending</option>
      <option value="sold">Sold</option>
    </select>
    <select id="filterPartner">
      <option value="">All Partners</option>
    </select>
    <button class="btn btn-primary" onclick="openModal()">＋ Add Vehicle</button>
  </div>

  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Year/Make/Model</th><th>VIN</th><th>Color</th>
            <th>Mileage</th><th>Partner</th><th>Cost Basis</th>
            <th>Sale Price</th><th>Profit</th><th>Status</th><th>Buyer</th><th></th>
          </tr>
        </thead>
        <tbody id="vehicleBody"></tbody>
      </table>
      <div class="empty" id="emptyMsg" style="display:none">No vehicles found.</div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Add Vehicle</h2>
    <div class="form-grid">
      <div class="field"><label>VIN</label><input id="f_vin" maxlength="17" placeholder="17-char VIN"/></div>
      <div class="field"><label>Year</label><input id="f_year" type="number" min="1990" max="2030" placeholder="2022"/></div>
      <div class="field"><label>Make</label><input id="f_make" placeholder="Toyota"/></div>
      <div class="field"><label>Model</label><input id="f_model" placeholder="Camry"/></div>
      <div class="field"><label>Color</label><input id="f_color" placeholder="White"/></div>
      <div class="field"><label>Mileage</label><input id="f_mileage" type="number" placeholder="35000"/></div>
      <div class="field"><label>Purchase Price ($)</label><input id="f_purchasePrice" type="number" placeholder="18000"/></div>
      <div class="field"><label>Import Fees ($)</label><input id="f_importFees" type="number" placeholder="1200"/></div>
      <div class="field"><label>Owner Partner</label><select id="f_ownerPartner"></select></div>
      <div class="field"><label>Status</label>
        <select id="f_status">
          <option value="available">Available</option>
          <option value="pending">Pending</option>
          <option value="sold">Sold</option>
        </select>
      </div>
      <div class="field"><label>Sale Price ($)</label><input id="f_salePrice" type="number" placeholder="Leave blank if not sold"/></div>
      <div class="field"><label>Sale Date</label><input id="f_saleDate" type="date"/></div>
      <div class="field"><label>Buyer Name</label><input id="f_buyerName" placeholder="Full name"/></div>
      <div class="field"><label>Buyer Phone</label><input id="f_buyerPhone" type="tel" placeholder="555-0000"/></div>
      <div class="field full"><label>Notes</label><textarea id="f_notes" placeholder="Any additional notes…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveVehicle()">Save Vehicle</button>
    </div>
  </div>
</div>

<script>
  let editId = null;

  function statusBadge(s) {
    return {
      available:'<span class="badge badge-blue">Available</span>',
      sold:'<span class="badge badge-green">Sold</span>',
      pending:'<span class="badge badge-orange">Pending</span>',
    }[s] || `<span class="badge badge-gray">${s}</span>`;
  }

  function renderTable() {
    const search  = document.getElementById('searchInput').value.toLowerCase();
    const fStatus = document.getElementById('filterStatus').value;
    const fParter = document.getElementById('filterPartner').value;
    let vList = DB.get('vehicles');

    if (search) vList = vList.filter(v =>
      [v.make,v.model,v.vin,v.buyerName,v.id,v.color].join(' ').toLowerCase().includes(search));
    if (fStatus) vList = vList.filter(v => v.status === fStatus);
    if (fParter) vList = vList.filter(v => v.ownerPartner === fParter);

    const body = document.getElementById('vehicleBody');
    const empty = document.getElementById('emptyMsg');

    if (!vList.length) { body.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display = 'none';

    body.innerHTML = vList.map(v => {
      const cost   = DB.vehicleCost(v);
      const profit = DB.vehicleProfit(v);
      const profitStr = profit === null ? '<span style="color:var(--muted)">—</span>' :
        `<span style="color:${profit>=0?'var(--success)':'var(--danger)'}">$${profit.toLocaleString()}</span>`;
      return `<tr>
        <td><b>${v.id}</b></td>
        <td><b>${v.year} ${v.make}</b><br><span style="color:var(--muted)">${v.model}</span></td>
        <td style="font-family:monospace;font-size:.75rem">${v.vin}</td>
        <td>${v.color}</td>
        <td>${v.mileage.toLocaleString()}</td>
        <td>${v.ownerPartner}</td>
        <td>$${cost.toLocaleString()}</td>
        <td>${v.salePrice ? '$'+Number(v.salePrice).toLocaleString() : '—'}</td>
        <td>${profitStr}</td>
        <td>${statusBadge(v.status)}</td>
        <td>${v.buyerName || '<span style="color:var(--muted)">—</span>'}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="editVehicle('${v.id}')">Edit</button>
          <button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="deleteVehicle('${v.id}')">Del</button>
        </td>
      </tr>`;
    }).join('');
  }

  function populatePartnerSelects() {
    const partners = DB.getPartners();
    const filterEl = document.getElementById('filterPartner');
    const formEl   = document.getElementById('f_ownerPartner');
    partners.forEach(p => {
      filterEl.innerHTML += `<option value="${p}">${p}</option>`;
      formEl.innerHTML   += `<option value="${p}">${p}</option>`;
    });
  }

  function openModal(id) {
    editId = id || null;
    document.getElementById('modalTitle').textContent = id ? 'Edit Vehicle' : 'Add Vehicle';
    if (!id) {
      ['vin','year','make','model','color','mileage','purchasePrice','importFees',
       'salePrice','saleDate','buyerName','buyerPhone','notes'].forEach(f =>
        document.getElementById('f_'+f).value = '');
      document.getElementById('f_status').value = 'available';
    } else {
      const v = DB.get('vehicles').find(x => x.id === id);
      if (!v) return;
      ['vin','year','make','model','color','mileage','purchasePrice','importFees',
       'salePrice','saleDate','buyerName','buyerPhone','notes','status','ownerPartner'].forEach(f =>
        document.getElementById('f_'+f).value = v[f] || '');
    }
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

  function editVehicle(id) { openModal(id); }

  function deleteVehicle(id) {
    if (!confirm('Delete this vehicle? This cannot be undone.')) return;
    const vList = DB.get('vehicles').filter(v => v.id !== id);
    DB.save('vehicles', vList);
    renderTable();
  }

  function saveVehicle() {
    const vehicles = DB.get('vehicles');
    const data = {
      vin: document.getElementById('f_vin').value.trim(),
      year: Number(document.getElementById('f_year').value),
      make: document.getElementById('f_make').value.trim(),
      model: document.getElementById('f_model').value.trim(),
      color: document.getElementById('f_color').value.trim(),
      mileage: Number(document.getElementById('f_mileage').value) || 0,
      purchasePrice: Number(document.getElementById('f_purchasePrice').value) || 0,
      importFees: Number(document.getElementById('f_importFees').value) || 0,
      ownerPartner: document.getElementById('f_ownerPartner').value,
      status: document.getElementById('f_status').value,
      salePrice: Number(document.getElementById('f_salePrice').value) || 0,
      saleDate: document.getElementById('f_saleDate').value,
      buyerName: document.getElementById('f_buyerName').value.trim(),
      buyerPhone: document.getElementById('f_buyerPhone').value.trim(),
      notes: document.getElementById('f_notes').value.trim(),
    };
    if (!data.make || !data.model || !data.year) { alert('Year, Make, and Model are required.'); return; }

    if (editId) {
      const idx = vehicles.findIndex(v => v.id === editId);
      vehicles[idx] = { ...vehicles[idx], ...data };
    } else {
      data.id = DB.nextId('V', vehicles);
      vehicles.push(data);
    }
    DB.save('vehicles', vehicles);
    closeModal();
    renderTable();
  }

  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('filterStatus').addEventListener('change', renderTable);
  document.getElementById('filterPartner').addEventListener('change', renderTable);

  populatePartnerSelects();
  renderTable();
</script>
</body>
</html>
