<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Motor Bros – Customer CRM</title>
  <script src="db.js"></script>
  <style>
    :root{--bg:#f1f5f9;--card:#fff;--muted:#64748b;--text:#0f172a;
      --accent:#3b82f6;--accent2:#6366f1;--border:#e2e8f0;
      --success:#059669;--warn:#d97706;--danger:#dc2626}
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);color:var(--text)}
    nav{background:linear-gradient(135deg,#1e3a5f,#1e40af);color:#fff;
      display:flex;align-items:center;overflow-x:auto;padding:0 16px;min-height:56px;border-bottom:1px solid #1d4ed8}
    nav .brand{font-weight:700;font-size:1.1rem;white-space:nowrap;margin-right:20px;padding:14px 0}
    nav a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.85rem;font-weight:500;
      padding:18px 12px;white-space:nowrap;border-bottom:3px solid transparent;transition:.15s}
    nav a:hover{color:#fff;background:rgba(255,255,255,.08)}
    nav a.active{color:#fff;border-bottom-color:#60a5fa}
    .page{max-width:1100px;margin:0 auto;padding:24px 16px}
    h1{font-size:1.4rem;font-weight:700;margin:0 0 4px}
    .subtitle{color:var(--muted);font-size:.88rem;margin:0 0 20px}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:8px;
      font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:.15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:#2563eb}
    .btn-outline{background:#fff;color:var(--accent);border:1px solid var(--border)}
    .btn-outline:hover{background:#f8fafc}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-sm{padding:4px 9px;font-size:.74rem}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center}
    .toolbar input,.toolbar select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;background:#fff}
    .toolbar input{flex:1;min-width:160px}
    /* Kanban */
    .kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
    .col{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:14px}
    .col-header{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
      margin-bottom:12px;display:flex;align-items:center;gap:6px}
    .col-header .count{background:rgba(0,0,0,.1);border-radius:99px;
      font-size:.7rem;padding:1px 7px}
    .lead-card{background:#fff;border:1px solid var(--border);border-radius:10px;
      padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s;position:relative}
    .lead-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(59,130,246,.15)}
    .lead-card .name{font-weight:700;font-size:.88rem;margin-bottom:4px}
    .lead-card .meta{font-size:.75rem;color:var(--muted);margin-bottom:6px}
    .lead-card .interest{font-size:.78rem;background:#f1f5f9;border-radius:6px;padding:3px 7px;display:inline-block}
    .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:600}
    .badge-hot{background:#fee2e2;color:#991b1b}
    .badge-warm{background:#ffedd5;color:#9a3412}
    .badge-cold{background:#dbeafe;color:#1e40af}
    .badge-converted{background:#dcfce7;color:#166534}
    /* Table view */
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.83rem}
    th{text-align:left;padding:9px 10px;font-size:.7rem;text-transform:uppercase;
      letter-spacing:.05em;color:var(--muted);border-bottom:2px solid var(--border);background:#fafafa;white-space:nowrap}
    td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#f8fafc}
    .view-toggle{display:flex;gap:6px;margin-bottom:12px}
    .view-btn{padding:6px 14px;border-radius:8px;font-size:.8rem;font-weight:600;
      cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted)}
    .view-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;
      display:none;align-items:center;justify-content:center;padding:16px}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;width:100%;max-width:540px;
      max-height:92vh;overflow-y:auto;padding:28px 24px;position:relative}
    .modal h2{margin:0 0 20px;font-size:1.1rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-grid .full{grid-column:1/-1}
    .field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);
      margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
    .field input,.field select,.field textarea{width:100%;padding:8px 10px;
      border:1px solid var(--border);border-radius:8px;font-size:.85rem;color:var(--text);background:#fff}
    .field textarea{resize:vertical;min-height:60px}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;
      padding-top:16px;border-top:1px solid var(--border)}
    .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;
      font-size:1.2rem;cursor:pointer;color:var(--muted)}
    @media(max-width:640px){.kanban{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav>
  <span class="brand">🚗 Motor Bros</span>
  <a href="dealership.html">Dashboard</a>
  <a href="vehicles.html">Inventory</a>
  <a href="payments.html">Payments</a>
  <a href="crm.html" class="active">CRM</a>
  <a href="partners.html">Partners</a>
  <a href="reports.html">Reports</a>
</nav>

<div class="page">
  <h1>Customer Leads (CRM)</h1>
  <p class="subtitle">Track prospects from first contact to sale. Hot leads need follow-up today.</p>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search name, phone, interest…"/>
    <select id="filterAssigned"><option value="">All Partners</option></select>
    <div class="view-toggle">
      <button class="view-btn active" id="btnKanban" onclick="setView('kanban')">Board</button>
      <button class="view-btn" id="btnTable" onclick="setView('table')">Table</button>
    </div>
    <button class="btn btn-primary" onclick="openModal()">＋ Add Lead</button>
  </div>

  <div id="kanbanView">
    <div class="kanban">
      <div class="col">
        <div class="col-header" style="color:var(--danger)">🔥 Hot <span class="count" id="cntHot">0</span></div>
        <div id="col-hot"></div>
      </div>
      <div class="col">
        <div class="col-header" style="color:var(--warn)">🌡 Warm <span class="count" id="cntWarm">0</span></div>
        <div id="col-warm"></div>
      </div>
      <div class="col">
        <div class="col-header" style="color:var(--accent)">❄️ Cold <span class="count" id="cntCold">0</span></div>
        <div id="col-cold"></div>
      </div>
    </div>
  </div>

  <div id="tableView" style="display:none">
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Interest</th><th>Source</th><th>Status</th><th>Assigned</th><th>Last Contact</th><th>Notes</th><th></th></tr></thead>
          <tbody id="leadBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Add Lead</h2>
    <div class="form-grid">
      <div class="field"><label>Name</label><input id="f_name" placeholder="Full name"/></div>
      <div class="field"><label>Phone</label><input id="f_phone" type="tel" placeholder="555-0000"/></div>
      <div class="field full"><label>Email</label><input id="f_email" type="email" placeholder="optional"/></div>
      <div class="field full"><label>Vehicle Interest</label><input id="f_interest" placeholder="e.g. SUV under $25k"/></div>
      <div class="field">
        <label>Source</label>
        <select id="f_source">
          <option>Instagram</option><option>Facebook</option><option>Referral</option>
          <option>Walk-in</option><option>WhatsApp</option><option>Website</option><option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f_status">
          <option value="hot">Hot 🔥</option>
          <option value="warm">Warm 🌡</option>
          <option value="cold">Cold ❄️</option>
          <option value="converted">Converted ✅</option>
        </select>
      </div>
      <div class="field"><label>Assigned To</label><select id="f_assignedTo"></select></div>
      <div class="field"><label>Last Contact</label><input id="f_lastContact" type="date"/></div>
      <div class="field full"><label>Notes</label><textarea id="f_notes" placeholder="What did they say? What are they looking for?"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLead()">Save Lead</button>
    </div>
  </div>
</div>

<script>
  let editId = null;
  let currentView = 'kanban';

  function statusBadge(s){
    return {hot:'<span class="badge badge-hot">Hot</span>',
      warm:'<span class="badge badge-warm">Warm</span>',
      cold:'<span class="badge badge-cold">Cold</span>',
      converted:'<span class="badge" style="background:#dcfce7;color:#166534">Converted</span>',
    }[s]||`<span class="badge">${s}</span>`;
  }

  function setView(v){
    currentView = v;
    document.getElementById('kanbanView').style.display = v==='kanban'?'':'none';
    document.getElementById('tableView').style.display  = v==='table'?'':'none';
    document.getElementById('btnKanban').className = 'view-btn'+(v==='kanban'?' active':'');
    document.getElementById('btnTable').className  = 'view-btn'+(v==='table'?' active':'');
    render();
  }

  function filteredLeads(){
    const search = document.getElementById('searchInput').value.toLowerCase();
    const fA     = document.getElementById('filterAssigned').value;
    let list = DB.get('leads');
    if (search) list = list.filter(l=>[l.name,l.phone,l.interest,l.source].join(' ').toLowerCase().includes(search));
    if (fA) list = list.filter(l=>l.assignedTo===fA);
    return list;
  }

  function leadCard(l){
    return `<div class="lead-card" onclick="openModal('${l.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="name">${l.name}</div>
        ${statusBadge(l.status)}
      </div>
      <div class="meta">📞 ${l.phone}${l.email?' · 📧 '+l.email:''}</div>
      ${l.interest?`<div class="interest">${l.interest}</div>`:''}
      <div style="font-size:.72rem;color:var(--muted);margin-top:6px">
        ${l.assignedTo} · Last contact: ${l.lastContact||'—'}
      </div>
    </div>`;
  }

  function renderKanban(){
    const list = filteredLeads();
    ['hot','warm','cold'].forEach(s=>{
      const filtered = list.filter(l=>l.status===s);
      document.getElementById('col-'+s).innerHTML = filtered.map(leadCard).join('') ||
        '<div style="color:var(--muted);font-size:.78rem;text-align:center;padding:12px">No leads</div>';
      document.getElementById('cnt'+s.charAt(0).toUpperCase()+s.slice(1)).textContent = filtered.length;
    });
  }

  function renderTable(){
    const list = filteredLeads();
    document.getElementById('leadBody').innerHTML = list.map(l=>`<tr>
      <td><b>${l.id}</b></td>
      <td><b>${l.name}</b></td>
      <td>${l.phone}</td>
      <td>${l.interest||'—'}</td>
      <td>${l.source||'—'}</td>
      <td>${statusBadge(l.status)}</td>
      <td>${l.assignedTo}</td>
      <td>${l.lastContact||'—'}</td>
      <td style="color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.notes||'—'}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="openModal('${l.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="deleteLead('${l.id}')">Del</button>
      </td>
    </tr>`).join('');
  }

  function render(){ currentView==='kanban' ? renderKanban() : renderTable(); }

  function populatePartnerSelects(){
    const partners = DB.getPartners();
    const filterEl = document.getElementById('filterAssigned');
    const formEl   = document.getElementById('f_assignedTo');
    partners.forEach(p=>{
      filterEl.innerHTML += `<option value="${p}">${p}</option>`;
      formEl.innerHTML   += `<option value="${p}">${p}</option>`;
    });
  }

  function openModal(id){
    editId = id||null;
    document.getElementById('modalTitle').textContent = id ? 'Edit Lead' : 'Add Lead';
    if(!id){
      ['name','phone','email','interest','notes'].forEach(f=>document.getElementById('f_'+f).value='');
      document.getElementById('f_status').value = 'warm';
      document.getElementById('f_source').value = 'Instagram';
      document.getElementById('f_lastContact').value = new Date().toISOString().slice(0,10);
    } else {
      const l = DB.get('leads').find(x=>x.id===id);
      if(!l) return;
      ['name','phone','email','interest','source','status','assignedTo','lastContact','notes']
        .forEach(f=>document.getElementById('f_'+f).value=l[f]||'');
    }
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

  function saveLead(){
    const leads = DB.get('leads');
    const data = {
      name: document.getElementById('f_name').value.trim(),
      phone: document.getElementById('f_phone').value.trim(),
      email: document.getElementById('f_email').value.trim(),
      interest: document.getElementById('f_interest').value.trim(),
      source: document.getElementById('f_source').value,
      status: document.getElementById('f_status').value,
      assignedTo: document.getElementById('f_assignedTo').value,
      lastContact: document.getElementById('f_lastContact').value,
      notes: document.getElementById('f_notes').value.trim(),
    };
    if(!data.name||!data.phone){ alert('Name and phone are required.'); return; }
    if(editId){
      const idx = leads.findIndex(l=>l.id===editId);
      leads[idx] = {...leads[idx], ...data};
    } else {
      data.id = DB.nextId('L', leads);
      leads.push(data);
    }
    DB.save('leads', leads);
    closeModal();
    render();
  }

  function deleteLead(id){
    if(!confirm('Delete this lead?')) return;
    DB.save('leads', DB.get('leads').filter(l=>l.id!==id));
    render();
  }

  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('filterAssigned').addEventListener('change', render);

  populatePartnerSelects();
  render();
</script>
</body>
</html>
